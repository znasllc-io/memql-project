# STAGING identity patch point (B2/C13). A strategic-merge patch that overrides
# the product bff's per-environment public hosts for STAGING: the expected token
# issuer AND the CORS allow-list origin.
#
# The base bff.yaml sets these to the LOCAL values (https://identity.<DOMAIN> and
# https://app.<DOMAIN>, where DOMAIN is the engine's fixed local domain). Staging
# serves identity + the SPA at its own public hosts, so the values below MUST
# match the staging identity issuer and the staging app origin, or the bff
# rejects every token / blocks the SPA's cross-origin calls. kustomize merges
# container env by name, so this replaces only those two variables.
#
# NEVER wildcard SERVER_ALLOWED_ORIGINS -- the bff is a credentialed API.
#
# PLACEHOLDER -- set to the real staging identity issuer + app origin (and align
# the public-entry.yaml hostnames + ACME email to the same staging domain) before
# pointing an ArgoCD Application at this overlay.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-__PRODUCT__
spec:
  template:
    spec:
      containers:
        - name: bff
          env:
            - name: MEMQL_IDENTITY_VERIFIER_EXPECTED_ISSUER
              value: "https://identity.staging.example.com"
            - name: SERVER_ALLOWED_ORIGINS
              value: "https://app.staging.example.com"

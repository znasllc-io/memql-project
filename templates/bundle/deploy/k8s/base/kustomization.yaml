# Product-owned resources for __PRODUCT__ (the DSL-first stack). The engine mesh
# + the dsl-bundle component are pulled in by the overlay; this base owns the
# bff head + the label patch that opts the mesh nodes into the bundle mount.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - bff.yaml
labels:
  - pairs:
      memql/product-dsl: "true"
    includeSelectors: false

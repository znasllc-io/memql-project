# Strategic-merge patch: register the product SPA's OAuth client on the identity
# Deployment for STAGING. The engine base carries only the product-neutral
# cockpit client; the product's client_id + redirect URI are per-environment
# overlay config.
#
# kustomize replaces the whole MEMQL_IDENTITY_REGISTERED_CLIENTS value, so this
# array MUST also carry the cockpit loopback entry -- dropping it breaks the
# memql-cockpit CLI login. Keep both entries.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: memql
spec:
  template:
    spec:
      containers:
        - name: identity
          env:
            - name: MEMQL_IDENTITY_REGISTERED_CLIENTS
              value: '[{"clientId":"app","redirectURIs":["https://app.__DOMAIN__/auth/callback"]},{"clientId":"cockpit","redirectURIs":["http://127.0.0.1/cockpit/callback","http://localhost/cockpit/callback"]}]'

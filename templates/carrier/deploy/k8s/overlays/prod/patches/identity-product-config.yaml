# Strategic-merge patch: register the product SPA's OAuth client on the identity
# Deployment for PROD. Placeholder kept coherent with staging -- swap for the
# real prod redirect URI when prod is stood up. Keeps the cockpit loopback entry
# (dropping it breaks the memql-cockpit CLI login).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: memql
spec:
  template:
    spec:
      containers:
        - name: identity
          env:
            - name: MEMQL_IDENTITY_REGISTERED_CLIENTS
              value: '[{"clientId":"app","redirectURIs":["https://app.__DOMAIN__/auth/callback"]},{"clientId":"cockpit","redirectURIs":["http://127.0.0.1/cockpit/callback","http://localhost/cockpit/callback"]}]'

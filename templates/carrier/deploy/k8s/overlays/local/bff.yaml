# BFF node for the LOCAL k3d stack -- the __PRODUCT__ product's backend head.
# Carrier image built by `make dev` (memql-bff:local via the engine's carrier
# hook), single replica, local identity issuer, LiveKit values from the seeded
# livekit-secrets. Owned by the __PRODUCT__-local ArgoCD Application.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
    memql/node-type: bff
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bff
        app.kubernetes.io/part-of: memql
        memql/node-type: bff
    spec:
      volumes:
        - name: memql-ca
          secret:
            secretName: memql-ca
      terminationGracePeriodSeconds: 60
      containers:
        - name: bff
          image: memql-bff:local
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - { name: http, containerPort: 8085 }
            - { name: grpc, containerPort: 50051 }
            - { name: node, containerPort: 50058 }
          envFrom:
            - secretRef:
                name: memql-secrets
            - configMapRef:
                name: memql-db-pool
          env:
            - { name: MEMQL_GENESIS_AUTOLOAD, value: "true" }
            - { name: SERVICE_NAME, value: "memQL" }
            - { name: MEMQL_NODE_TYPE, value: "bff" }
            - { name: MEMQL_NODE_ADDRESS, value: "bff:50058" }
            - { name: MEMQL_NODE_ID, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: MEMQL_DEPLOYMENT_ID, valueFrom: { fieldRef: { fieldPath: "metadata.labels['pod-template-hash']" } } }
            - { name: MEMQL_NODE_SERVICE_ADDRESS, value: ":50058" }
            - { name: MEMQL_WORKER_PEERS, value: "voice=voice:50059,agent=agent:50055,cognition=cognition:50054,planner=planner:50056,workbench=workbench:50060" }
            - { name: MEMQL_GRPC_ADDRESS, value: ":50051" }
            - { name: MEMQL_POLYPHON_LIVEKIT_URL, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_URL } } }
            - { name: MEMQL_POLYPHON_LIVEKIT_PUBLIC_URL, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_PUBLIC_URL } } }
            - { name: MEMQL_POLYPHON_LIVEKIT_API_KEY, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_API_KEY } } }
            - { name: MEMQL_POLYPHON_LIVEKIT_API_SECRET, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_API_SECRET } } }
            - { name: SERVER_ADDRESS, value: "0.0.0.0:8085" }
            - { name: MEMQL_IDENTITY_VERIFIER_BASE_URL, value: "https://identity:8085" }
            - { name: MEMQL_IDENTITY_VERIFIER_AUDIENCE, value: "memql" }
            - { name: MEMQL_IDENTITY_VERIFIER_EXPECTED_ISSUER, value: "https://identity.__DOMAIN__" }
            - { name: MEMQL_IDENTITY_ENABLED, value: "false" }
            - { name: MEMQL_HTTP_TLS_CA_FILE, value: "/etc/memql/cacerts/ca.crt" }
            - { name: SSL_CERT_DIR, value: "/etc/ssl/certs:/etc/memql/cacerts" }
            - { name: SERVER_ALLOWED_ORIGINS, value: "*" }
            - { name: MEMORY_NODES_DATABASE_MIGRATE_ON_START, value: "false" }
          volumeMounts:
            - { name: memql-ca, mountPath: /etc/memql/cacerts, readOnly: true }
          startupProbe:
            httpGet: { path: /healthz, port: 8085 }
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: 8085 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /livez, port: 8085 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 200m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bff
  ports:
    - { name: node, port: 50058, targetPort: 50058 }
    - { name: http, port: 8085, targetPort: 8085 }
    - { name: grpc, port: 50051, targetPort: 50051 }
---
# External entry for the local stack via the k3d LoadBalancer. identity owns
# host port 8085, so the bff's HTTP surface is exposed on 8086. Requires the
# cluster created with EXTRA_PORTS=50051:50051,8086:8086 (make up passes it).
apiVersion: v1
kind: Service
metadata:
  name: bff-external
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
    memql/role: external-entry
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: bff
  ports:
    - { name: http, port: 8086, targetPort: 8085 }
    - { name: grpc, port: 50051, targetPort: 50051 }

# Local in-cluster SPA (mirrors deploy/k8s/product/__PRODUCT__.yaml, which serves
# staging/prod): the image is built from the __PRODUCT__-client checkout by that
# repo's `make up` (__PRODUCT__:local) and imported into k3d -- nothing runs on
# the host, so the stack survives the terminal session. The Vite HMR inner loop
# (the client repo's `make dev`, localhost:8080) is the attached complement, not
# part of `make up`.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __PRODUCT__
  namespace: memql
  labels:
    app.kubernetes.io/name: __PRODUCT__
    app.kubernetes.io/part-of: memql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __PRODUCT__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __PRODUCT__
        app.kubernetes.io/part-of: memql
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: __PRODUCT__
          image: __PRODUCT__:local
          imagePullPolicy: Never
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: APP_PORT, value: "8080" }
            - { name: FRONTEND_PORT, value: "8080" }
            - { name: CORS_ALLOWED_ORIGIN, value: "*" }
            - { name: VITE_MEMQL_API_URL, value: "http://bff:8085" }
          readinessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: __PRODUCT__
  namespace: memql
  labels:
    app.kubernetes.io/name: __PRODUCT__
    app.kubernetes.io/part-of: memql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: __PRODUCT__
  ports:
    - { name: http, port: 8080, targetPort: 8080 }

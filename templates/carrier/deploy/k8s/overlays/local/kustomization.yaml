# __PRODUCT__ product resources for the LOCAL k3d stack -- ONLY the resources
# this repo owns (the bff head + the SPA + the front door). The engine mesh
# (identity / voice / mcp / cognition / agent / planner / workbench + postgres)
# is owned by the engine's own ArgoCD Application (memql-local, from the public
# engine repo); this overlay is tracked by the __PRODUCT__-local Application
# registered by `make up` (scripts/dev/register-app.sh). One Application per
# repo -- no cross-repo kustomize bases.
#
# The carrier node images (cognition / agent / planner / workbench) are NOT
# re-declared here: they keep the engine overlay's memql-<type>:local image
# names, and `make dev` in THIS repo rebuilds those names from this repo's
# Dockerfile (the carrier hook) -- the override is in image CONTENT, not
# manifests.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: memql

resources:
  - bff.yaml
  - front-door.yaml
  - __PRODUCT__-local.yaml

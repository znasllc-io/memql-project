# Public HTTPS entry for the __PRODUCT__ product (staging/prod). Requires the
# cluster add-ons installed out-of-band:
#   - ingress-nginx controller (LoadBalancer + a pinned static IP)
#   - cert-manager (issues the Let's Encrypt certs referenced below)
#
# Hosts (all A records point at the ingress controller's static public IP):
#   app.__DOMAIN__       -> __PRODUCT__ SPA (+ same-origin proxy to BFF/identity)
#   identity.__DOMAIN__  -> identity service (login UI, /setup, /admin)
#   mcp.__DOMAIN__       -> mcp node (remote MCP head, /mcp)
#   bff.__DOMAIN__       -> bff raw gRPC (native clients, e.g. memql-cockpit)
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@__DOMAIN__
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# identity.__DOMAIN__ -> identity (HTTPS backend; identity serves TLS with the
# internal self-signed cert, so skip backend cert verification).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __PRODUCT__-identity
  namespace: memql
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [identity.__DOMAIN__]
      secretName: identity-__PRODUCT__-tls
  rules:
    - host: identity.__DOMAIN__
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: identity, port: { number: 8085 } } } }
---
# app.__DOMAIN__ main routes: SPA (/) -> __PRODUCT__, WS (/memql) -> bff, audio
# WS (/memql/audio) -> voice. The audio path needs the voice node, so it gets
# its own longer-prefix rule (wins over /memql). This Ingress owns the host's
# TLS cert (cert-manager).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-main
  namespace: memql
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.__DOMAIN__]
      secretName: app-__PRODUCT__-tls
  rules:
    - host: app.__DOMAIN__
      http:
        paths:
          - { path: /memql/audio, pathType: Prefix, backend: { service: { name: voice, port: { number: 8085 } } } }
          - { path: /memql, pathType: Prefix, backend: { service: { name: bff, port: { number: 8085 } } } }
          - { path: /, pathType: Prefix, backend: { service: { name: __PRODUCT__, port: { number: 8080 } } } }
---
# app.__DOMAIN__ same-origin auth proxy: the token XHRs the SPA makes (relative
# paths) must reach identity, NOT the SPA. Separate Ingress because these need
# the HTTPS-backend annotation (identity serves TLS). Longest-prefix wins over
# "/" above; /auth/callback (an SPA route) falls through to the SPA.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-identity-proxy
  namespace: memql
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.__DOMAIN__]
      secretName: app-__PRODUCT__-tls
  rules:
    - host: app.__DOMAIN__
      http:
        paths:
          - { path: /auth/refresh, pathType: Prefix, backend: { service: { name: identity, port: { number: 8085 } } } }
          - { path: /auth/logout, pathType: Prefix, backend: { service: { name: identity, port: { number: 8085 } } } }
          - { path: /oauth/token, pathType: Prefix, backend: { service: { name: identity, port: { number: 8085 } } } }
          - { path: /.well-known/jwks.json, pathType: Prefix, backend: { service: { name: identity, port: { number: 8085 } } } }
---
# mcp.__DOMAIN__ -> mcp node (remote MCP head). cert-manager owns the TLS cert;
# nginx terminates TLS and forwards plain HTTP to the mcp Service :8090. Sticky
# sessions (cookie affinity) keep an Mcp-Session-Id bound to one pod for HA.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __PRODUCT__-mcp
  namespace: memql
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "mcp_route"
    nginx.ingress.kubernetes.io/session-cookie-samesite: "None"
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [mcp.__DOMAIN__]
      secretName: mcp-__PRODUCT__-tls
  rules:
    - host: mcp.__DOMAIN__
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: mcp, port: { number: 8090 } } } }
---
# bff.__DOMAIN__ -> bff RAW gRPC (MemqlService.Stream) for native clients like
# memql-cockpit. nginx terminates TLS (cert-manager) and forwards h2c gRPC to
# bff:50051.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: __PRODUCT__-bff-grpc
  namespace: memql
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [bff.__DOMAIN__]
      secretName: bff-__PRODUCT__-tls
  rules:
    - host: bff.__DOMAIN__
      http:
        paths:
          - { path: /, pathType: Prefix, backend: { service: { name: bff, port: { number: 50051 } } } }

# __PRODUCT__ frontend (the product app UI). A stateless server that serves the
# built SPA bundle + a few /api/* endpoints on :8080. Same-origin auth (/auth/*,
# /oauth/token, /.well-known/jwks.json) and the WS bridge (/memql/ws) routing is
# done at the ingress (public-entry.yaml), not here. The image is built from the
# product's client repo (__PRODUCT__-client); the staging/prod overlays digest-pin it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: __PRODUCT__
  namespace: memql
  labels:
    app.kubernetes.io/name: __PRODUCT__
    app.kubernetes.io/part-of: memql
spec:
  # Stateless SPA/proxy server (no engine, no scheduler, no mesh) -- scales
  # freely. 2 replicas + the PDB below keep the frontend serving through
  # deploys, pod crashes, and node drains.
  replicas: 2
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __PRODUCT__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __PRODUCT__
        app.kubernetes.io/part-of: memql
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: __PRODUCT__
          image: acrmemql.azurecr.io/__PRODUCT__:__ENGINE_VERSION__
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: NODE_ENV, value: "production" }
            - { name: APP_PORT, value: "8080" }
            - { name: FRONTEND_PORT, value: "8080" }
            - { name: CORS_ALLOWED_ORIGIN, value: "*" }
            # Server-side memQL URL for the app's /api/* endpoints (internal BFF).
            - { name: VITE_MEMQL_API_URL, value: "http://bff:8085" }
          readinessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: __PRODUCT__
  namespace: memql
  labels:
    app.kubernetes.io/name: __PRODUCT__
    app.kubernetes.io/part-of: memql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: __PRODUCT__
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
# Keep at least one frontend pod serving through voluntary disruptions.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: __PRODUCT__
  namespace: memql
  labels:
    app.kubernetes.io/name: __PRODUCT__
    app.kubernetes.io/part-of: memql
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: __PRODUCT__

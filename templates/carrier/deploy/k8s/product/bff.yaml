# BFF node -- backend for frontend, the __PRODUCT__ product's primary external
# API surface and mesh parent of the worker nodes. Its Service name `bff` makes
# the in-mesh peer value `bff:50058` resolve via same-namespace cluster DNS.
# The image is the carrier build (engine + __PRODUCT__ pack); the staging/prod
# overlays digest-pin it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
    memql/node-type: bff
spec:
  # 2 replicas so the external LB always has a serving pod during a roll (the
  # BFF is the user connection anchor). maxUnavailable=1/maxSurge=0 drains an
  # old pod before starting its replacement so the transient fleet-wide DB
  # connection count never surges past the database's max_connections.
  replicas: 2
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bff
        app.kubernetes.io/part-of: memql
        memql/node-type: bff
    spec:
      volumes:
        - name: memql-ca
          secret:
            secretName: memql-ca
      terminationGracePeriodSeconds: 60
      containers:
        - name: bff
          image: acrmemql.azurecr.io/memql-bff-__PRODUCT__:__ENGINE_VERSION__
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          ports:
            - { name: http, containerPort: 8085 }
            - { name: grpc, containerPort: 50051 }
            - { name: node, containerPort: 50058 }
          envFrom:
            - secretRef:
                name: memql-secrets
            - configMapRef:
                name: memql-db-pool
          env:
            - { name: MEMQL_GENESIS_AUTOLOAD, value: "true" }
            - { name: SERVICE_NAME, value: "memQL" }
            - { name: MEMQL_NODE_TYPE, value: "bff" }
            - { name: MEMQL_NODE_ADDRESS, value: "bff:50058" }
            - { name: MEMQL_NODE_ID, valueFrom: { fieldRef: { fieldPath: metadata.name } } }
            - { name: MEMQL_DEPLOYMENT_ID, valueFrom: { fieldRef: { fieldPath: "metadata.labels['pod-template-hash']" } } }
            - { name: MEMQL_NODE_SERVICE_ADDRESS, value: ":50058" }
            - { name: MEMQL_WORKER_PEERS, value: "voice=voice:50059,agent=agent:50055,cognition=cognition:50054,planner=planner:50056,workbench=workbench:50060" }
            - { name: MEMQL_GRPC_ADDRESS, value: ":50051" }
            - { name: MEMQL_POLYPHON_LIVEKIT_URL, value: "ws://livekit:7880" }
            - { name: MEMQL_POLYPHON_LIVEKIT_PUBLIC_URL, value: "wss://livekit.__DOMAIN__" }
            - { name: MEMQL_POLYPHON_LIVEKIT_API_KEY, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_API_KEY } } }
            - { name: MEMQL_POLYPHON_LIVEKIT_API_SECRET, valueFrom: { secretKeyRef: { name: livekit-secrets, key: MEMQL_POLYPHON_LIVEKIT_API_SECRET } } }
            - { name: SERVER_ADDRESS, value: "0.0.0.0:8085" }
            - { name: MEMQL_IDENTITY_VERIFIER_BASE_URL, value: "https://identity:8085" }
            - { name: MEMQL_IDENTITY_VERIFIER_AUDIENCE, value: "memql" }
            - { name: MEMQL_IDENTITY_VERIFIER_EXPECTED_ISSUER, value: "https://identity.__DOMAIN__" }
            - { name: MEMQL_IDENTITY_ENABLED, value: "false" }
            - { name: MEMQL_HTTP_TLS_CA_FILE, value: "/etc/memql/cacerts/ca.crt" }
            - { name: SSL_CERT_DIR, value: "/etc/ssl/certs:/etc/memql/cacerts" }
            - { name: SERVER_ALLOWED_ORIGINS, value: "*" }
            # Shared DB -- migrations run ONCE on the identity node.
            - { name: MEMORY_NODES_DATABASE_MIGRATE_ON_START, value: "false" }
          volumeMounts:
            - { name: memql-ca, mountPath: /etc/memql/cacerts, readOnly: true }
          startupProbe:
            httpGet: { path: /healthz, port: 8085 }
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: 8085 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /livez, port: 8085 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 200m, memory: 256Mi }
---
# ClusterIP -- in-mesh DNS target `bff` (NodeService 50058 + http 8085 + grpc).
apiVersion: v1
kind: Service
metadata:
  name: bff
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: bff
  ports:
    - { name: node, port: 50058, targetPort: 50058 }
    - { name: http, port: 8085, targetPort: 8085 }
    - { name: grpc, port: 50051, targetPort: 50051 }
---
# External entry point (browsers use the app.__DOMAIN__ ingress WS bridge;
# native gRPC clients reach the bff over the bff.__DOMAIN__ ingress).
apiVersion: v1
kind: Service
metadata:
  name: bff-external
  namespace: memql
  labels:
    app.kubernetes.io/name: bff
    app.kubernetes.io/part-of: memql
    memql/role: external-entry
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: bff
  ports:
    - { name: http, port: 8085, targetPort: 8085 }

# The __PRODUCT__ product STAGING Application, owned by this repo. It reconciles
# the full-stack staging overlay (engine base + product head + SPA + public
# entry) into the in-cluster memql namespace.
#
# INITIALLY MANUAL-SYNC (the `automated:` block is intentionally omitted): sync
# once by hand and verify the render before promoting to
# `automated: {prune: true, selfHeal: true}`.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: __PRODUCT__-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: __PRODUCT__
  source:
    repoURL: https://github.com/__PRODUCT_ORG__/__PRODUCT__-carrier.git
    targetRevision: main
    path: deploy/k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: memql
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
  # memql-secrets is created out-of-band (real values) and is NOT in git, so it
  # is never pruned. Replica count is HPA/autoscaler-owned; don't thrash on it.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

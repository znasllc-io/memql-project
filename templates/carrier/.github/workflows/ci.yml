name: ci

# Go CI for the __PRODUCT__ carrier pack. Until now the pack had NO go-test lane
# at all, so its DSL-load tests never ran in CI and -- worse -- nothing booted
# the __PRODUCT__ DSL tree against the engine. That gap let the pack rot against
# several engine grammar epics without any signal (memql#2344). This workflow
# closes it:
#
#   go-checks : build + vet + the full go test suite. Includes the
#               __PRODUCT__-tree load gate (__PRODUCT___tree_load_test.go), which
#               fails if ANY __PRODUCT__ construct stops loading against the
#               engine. DB-gated tests self-skip here (no Postgres).
#   db-tests  : seeds a TimescaleDB + extensions and runs the DB-seeded
#               behavioural suite (dsl/__PRODUCT__) for real -- e.g. the
#               saved/archived space-list gating guard (memql#1675 / #2344).
#
# The pack module depends on github.com/znasllc-io/memql via a
# `replace => ../memql`, so both jobs check the engine out as a sibling and
# rely on that replace (no go.work needed). znasllc-io/memql is public, so no
# token is required.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  go-checks:
    name: go-checks
    runs-on: ubuntu-latest
    env:
      GOWORK: off
    steps:
      - name: checkout __PRODUCT__ BFF
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: memql-bff-__PRODUCT__
      - name: checkout memql core (sibling for the ../memql replace)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: znasllc-io/memql
          path: memql
      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: memql-bff-__PRODUCT__/go.sum
      - name: build
        working-directory: memql-bff-__PRODUCT__
        run: go build ./...
      - name: vet
        working-directory: memql-bff-__PRODUCT__
        run: go vet ./...
      - name: test (DB-gated suites self-skip without Postgres)
        working-directory: memql-bff-__PRODUCT__
        run: go test -count=1 ./...

  db-tests:
    name: db-tests
    runs-on: ubuntu-latest
    env:
      GOWORK: off
      MEMQL_DATABASE_DSN: postgres://memql:memql_dev@localhost:5432/memql?sslmode=disable
    services:
      # Same image the engine dev cluster + conformance + engine db-tests use;
      # bundles TimescaleDB + pgvector so the memory-nodes migrations apply.
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: memql
          POSTGRES_PASSWORD: memql_dev
          POSTGRES_DB: memql
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U memql"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: checkout __PRODUCT__ BFF
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: memql-bff-__PRODUCT__
      - name: checkout memql core (sibling for the ../memql replace)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: znasllc-io/memql
          path: memql
      - name: setup go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: memql-bff-__PRODUCT__/go.sum
      # Create the extensions the migrations expect (mirrors the engine's
      # docker/init-db.sql, which a service container can't mount). The
      # MemoryNodesDatabase migrate-on-start path applies the rest.
      - name: create required Postgres extensions
        run: |
          for i in $(seq 1 30); do
            PGPASSWORD=memql_dev pg_isready -h localhost -U memql && break
            echo "waiting for postgres ($i)"; sleep 2
          done
          PGPASSWORD=memql_dev psql -h localhost -U memql -d memql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS timescaledb CASCADE;
          CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
          CREATE EXTENSION IF NOT EXISTS "pgcrypto";
          CREATE EXTENSION IF NOT EXISTS vector;
          SQL
      - name: db-seeded __PRODUCT__ suite
        working-directory: memql-bff-__PRODUCT__
        run: go test -count=1 -timeout=300s ./dsl/__PRODUCT__/...

  ci-required:
    name: ci-required
    if: ${{ always() }}
    needs:
      - go-checks
      - db-tests
    runs-on: ubuntu-latest
    steps:
      - name: verify required lanes succeeded
        env:
          GO_CHECKS: ${{ needs.go-checks.result }}
          DB_TESTS: ${{ needs.db-tests.result }}
        run: |
          echo "go-checks=$GO_CHECKS db-tests=$DB_TESTS"
          for r in "$GO_CHECKS" "$DB_TESTS"; do
            if [ "$r" != "success" ]; then
              echo "a required CI lane did not succeed"; exit 1
            fi
          done
          echo "all required lanes green"

name: release-lockfile

# DECOUPLING P3: MOVED from the engine repo; SUPERSEDES
# znasllc-io/memql/.github/workflows/release-lockfile.yml. The release lockfiles
# (releases/) + coherence tooling (scripts/release/) now live in THIS pack, so
# the coherence gate runs here on PRs/pushes touching them. No secrets required.
#
# ---------------------------------------------------------------------------
# deployment-v2 Phase 4 (znasllc-io/memql#702). A release lockfile
# (releases/<version>.yaml) pins all release components by @sha256: digest; it is the
# atomic unit of staging->prod promotion (digest copy, no rebuild). This gate
# keeps every lockfile honest: all expected components present, all digest-pinned, and the
# carrier + SPA coherent with the engine version (builtAgainstEngine ==
# engineVersion). An incoherent set fails here instead of shipping.

on:
  pull_request:
    branches: [main]
    paths:
      - 'releases/**'
      - 'scripts/release/**'
      - '.github/workflows/release-lockfile.yml'
  push:
    branches: [main]
    paths:
      - 'releases/**'
      - 'scripts/release/**'

permissions:
  contents: read

jobs:
  coherence:
    name: lockfiles are coherent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - run: pip install --require-hashes -r scripts/release/requirements.txt
      - name: coherence-check all release lockfiles
        run: bash scripts/release/coherence-check.sh --all

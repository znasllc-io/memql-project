name: release-lockfile-assemble

# DECOUPLING P3: this workflow was MOVED from the engine repo and SUPERSEDES
# znasllc-io/memql/.github/workflows/release-lockfile-assemble.yml. The release
# lockfiles + assemble tooling now live in THIS pack (releases/, scripts/release/).
#
# CUTOVER PREREQUISITE (OIDC): the Azure federated credential that authorizes
# `azure/login` below is keyed to the workflow's repo. It must be (re)configured
# with the subject `repo:__PRODUCT_ORG__/memql-bff-__PRODUCT__:ref:refs/heads/main`
# before this workflow can read ACR. The secret NAMES are unchanged
# (AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID) -- provision them
# in THIS repo's Actions secrets. Until then this workflow_dispatch fails at
# login (never silently); it is not wired to any auto-trigger.
#
# ---------------------------------------------------------------------------
# Build-speed C6 (epic znasllc-io/memql#1505, #1511). Ties the per-repo CI image
# builds (C3 engine / C4 carriers / C5 SPA) together into a release lockfile:
# resolves the 8 components' @sha256 digests FROM ACR by tag, runs
# scripts/release/assemble-lockfile.sh (which self-validates via the coherence
# gate), and opens the releases/<version>.yaml PR. No manual digest copying --
# the operator runs ONE dispatch after the three build workflows have pushed
# their <version> tags.
#
# Build-only-what-changed: a component whose source didn't change isn't rebuilt,
# so its <version> tag won't exist. Pass --<comp>=sha256:... (or pre-seed the
# tag) to pin a prior digest; the coherence gate still enforces
# builtAgainstEngine == engineVersion.
#
# Auth: GitHub OIDC -> Azure (read the registry; the federated subject is
# repo:__PRODUCT_ORG__/memql-bff-__PRODUCT__:ref:refs/heads/main -> runs on main).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version whose <comp>:<version> image tags to assemble (e.g. 0.1.0)."
        required: true
        type: string
      engine_version:
        description: "Engine version the carrier + SPA were built against (builtAgainstEngine). Defaults to version."
        required: false
        default: ""
        type: string

# Least-privilege default: the token is read-only at the workflow level;
# the single job below hoists the writes it actually needs (Scorecard
# Token-Permissions hardening).
permissions:
  contents: read

env:
  ACR_NAME: acrmemql

jobs:
  assemble:
    name: assemble lockfile ${{ inputs.version }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the lockfile to a branch
      pull-requests: write # open the lockfile PR
      id-token: write # OIDC token for azure/login
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install coherence-check deps
        run: pip install --require-hashes -r scripts/release/requirements.txt

      - name: Resolve digests from ACR + assemble lockfile
        env:
          VERSION: ${{ inputs.version }}
          ENGINE_VERSION: ${{ inputs.engine_version }}
        run: |
          set -euo pipefail
          : "${ENGINE_VERSION:=$VERSION}"
          # The 9 lockfile components == their ACR repository names (see
          # scripts/release/assemble-lockfile.sh). Resolve each :<version>
          # tag's digest and export it as DIGEST_<comp_with_underscores>.
          # memql-mcp is engine-built (build-engine-images) like identity/voice
          # and MUST be in this list or assemble-lockfile.sh fails with
          # "no digest for memql-mcp (set DIGEST_memql_mcp)".
          comps="memql-identity memql-cognition memql-voice memql-mcp memql-agent memql-planner memql-workbench memql-bff-__PRODUCT__ __PRODUCT__"
          for c in $comps; do
            digest="$(az acr repository show --name "$ACR_NAME" --image "${c}:${VERSION}" --query digest -o tsv 2>/dev/null || true)"
            if [ -z "$digest" ]; then
              echo "::error::no digest for ${c}:${VERSION} in ${ACR_NAME} -- did its build workflow run + push this version?" >&2
              exit 1
            fi
            var="DIGEST_$(echo "$c" | tr '-' '_')"
            export "${var}=${digest}"
            echo "INFO: ${c} -> ${digest}"
          done
          bash scripts/release/assemble-lockfile.sh \
            --version="$VERSION" --engine-version="$ENGINE_VERSION"

      - name: Open the lockfile PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: release-lockfile/${{ inputs.version }}
          add-paths: releases/${{ inputs.version }}.yaml
          commit-message: "release: add releases/${{ inputs.version }}.yaml (#1511)"
          title: "release: lockfile ${{ inputs.version }}"
          body: |
            Assembled by `release-lockfile-assemble` (build-speed C6, #1511).
            Digests resolved from `acrmemql` by the `<component>:${{ inputs.version }}` tags
            (built by C3/C4/C5). Already validated in-job by the coherence gate;
            the `lockfiles are coherent` + `overlays are digest-pinned` checks re-run here.

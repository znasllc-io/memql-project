name: __PRODUCT__-sdk-publish

# Publishes @__PRODUCT_ORG__/__PRODUCT__-sdk (sdk/ts) to GitHub Packages.
# Trigger by pushing a tag like `__PRODUCT__-sdk-v0.1.0`, or run manually.
# Bump sdk/ts/package.json "version" before tagging.
#
# Requires a repo secret PACKAGES_TOKEN: a token with WRITE access to
# __PRODUCT_ORG__ packages AND READ access to znasllc-io packages -- this
# package depends on @znasllc-io/memql-sdk-core, which must already be
# published. The default GITHUB_TOKEN cannot read the other org's package,
# hence a PAT / app token.
on:
  push:
    tags:
      - '__PRODUCT__-sdk-v*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/ts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@__PRODUCT_ORG__'
      - name: configure GitHub Packages registries (both scopes)
        # Overwrite the npmrc setup-node points npm at (NPM_CONFIG_USERCONFIG)
        # with a clean, complete file. Appending with `echo >>` glued the
        # @znasllc-io line onto setup-node's trailing-newline-less _authToken
        # line, corrupting the scope so the private core dep 404'd on the
        # public registry. The literal ${NODE_AUTH_TOKEN} is expanded by npm
        # from the env at install/publish time (= PACKAGES_TOKEN).
        run: |
          printf '%s\n' \
            '@__PRODUCT_ORG__:registry=https://npm.pkg.github.com' \
            '@znasllc-io:registry=https://npm.pkg.github.com' \
            '//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}' \
            > "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
      - name: install deps
        run: npm install --no-audit --no-fund
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
      - name: build
        run: npm run build
      - name: publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

name: publish-releases

# DECOUPLING P3: MOVED from the engine repo; SUPERSEDES
# znasllc-io/memql/.github/workflows/publish-releases.yml. The release lockfiles
# (releases/) now live in THIS pack, so the Release-publish trigger lives here.
#
# CUTOVER CAVEATS (see the P3 runbook -- deliberately NOT changed in step 1):
#   * scripts/release/publish-releases.sh still hardcodes MEMQL_REPO=
#     "znasllc-io/memql" and publishes the STACK Releases there via gh. In this
#     pack the default GITHUB_TOKEN is scoped to __PRODUCT_ORG__/memql-bff-__PRODUCT__,
#     so publishing to the engine repo needs a cross-repo token (or the "where do
#     stack Releases live post-move" decision must be made by the owner).
#   * the best-effort docs-bundle step in publish-releases.sh calls engine-only
#     tooling (cmd/docs-gen + scripts/docs/build-docs-bundle.sh) that is NOT in
#     this pack; it warns + skips cleanly (the script guards it).
# Both are OWNER decisions for the cutover, not step-1 changes.
#
# ---------------------------------------------------------------------------
# znasllc-io/memql#1097. When a new release lockfile (releases/<X.Y.Z>.yaml)
# lands on main, publish the matching GitHub Release so the Releases page never
# drifts from the lockfiles.
#
# This job publishes the **memql** Releases only -- that needs nothing but git
# history + the default GITHUB_TOKEN (contents: write). The script is
# idempotent (existing Releases are skipped), so a re-run or a multi-lockfile
# push is safe.
#
# The **component** Releases (__PRODUCT_ORG__/memql-bff-__PRODUCT__ + __PRODUCT__,
# deduplicated by image digest) additionally need `az` (ACR build-time, for the
# commit anchor) and a cross-org token, so they are NOT done here. Run them
# after a release from the primary checkout (where az is authenticated):
#
#     bash scripts/release/publish-releases.sh --repo=components
#
# To automate the component half too, add a second job with Azure OIDC
# (azure/login) + a RELEASE_PUBLISH_TOKEN PAT that can write Releases in the
# __PRODUCT_ORG__ repos, and run the script with --repo=components.

on:
  push:
    branches: [main]
    paths:
      - 'releases/**'

# Least-privilege default (Scorecard Token-Permissions, alert #277): the
# top-level token is read-only; only the job that publishes Releases is granted
# contents: write.
permissions:
  contents: read

jobs:
  publish-memql:
    name: publish GitHub Releases (memql)
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub Releases via gh / GITHUB_TOKEN
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need full history to find each lockfile's introducing commit
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: false # one-shot run; build-cache restore not worth it here
      - name: publish memql Releases + attach docs bundle (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        # Publishes the Release(s), then builds + attaches docs-<latest>.tgz via
        # cmd/docs-gen + scripts/docs/build-docs-bundle.sh. The docs step is
        # best-effort: a failure leaves the Release intact, just without the docs
        # asset. memql.io consumes the per-release bundle (memql#1172).
        run: bash scripts/release/publish-releases.sh --repo=memql

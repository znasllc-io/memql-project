name: deploy-drift

# DECOUPLING P3: MOVED from the engine repo; SUPERSEDES
# znasllc-io/memql/.github/workflows/deploy-drift.yml. The product deploy
# overlays (deploy/k8s/overlays/{staging,prod,local}) now live in THIS pack.
#
# WHY THE GATE IS INLINED (not `scripts/deploy/drift-check.sh`): drift-check.sh
# is an ENGINE-GENERIC capability backend that STAYS engine-side and is NOT
# copied into this pack. It also resolves overlays relative to its OWN repo
# root, so running the engine copy would check the ENGINE overlays, not these.
# So this workflow inlines the SAME `--rendered` digest-pin assertion
# drift-check.sh performs: render each overlay and FAIL if any image is left on
# a floating tag (the #684 root cause), skipping the `local` overlay (dev-built
# images carry mutable :local tags, not @sha256 digests -- znasllc-io/memql#2064).
#
# NOTE: the staging/prod overlays compose the engine base via a REMOTE kustomize
# base (github.com/znasllc-io/memql//deploy/k8s/base). `kubectl kustomize` fetches
# it over the network -- CI runners have github.com egress, so the render works.

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/k8s/**'
      - '.github/workflows/deploy-drift.yml'
  push:
    branches: [main]
    paths:
      - 'deploy/k8s/**'

permissions:
  contents: read

jobs:
  rendered-digest-gate:
    name: overlays are digest-pinned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0
        with:
          version: 'v1.30.0'
      - name: assert every env overlay pins images by digest
        run: |
          set -euo pipefail
          shopt -s nullglob
          found=0
          for overlay in deploy/k8s/overlays/*/; do
            env="$(basename "$overlay")"
            echo "::group::rendered digest-pin gate --env=$env"
            found=1
            # Render the overlay; emit one "name@digest-or-tag" per image line
            # (mirrors drift-check.sh rendered_images()).
            imgs="$(kubectl kustomize "$overlay" 2>/dev/null \
              | awk '/^[[:space:]]+image:[[:space:]]/ { sub(/^[[:space:]]+image:[[:space:]]*/, ""); gsub(/"/, ""); print }' \
              | sort -u)"
            if [ -z "$imgs" ]; then
              echo "ERROR: $env overlay rendered no container images (render failure?)"; exit 1
            fi
            # The `local` overlay uses locally-built :local tags, not @sha256
            # digests -- skip the digest gate, just confirm it renders (#2064).
            if [ "$env" = "local" ]; then
              echo "INFO: skipping digest-pin gate for the 'local' overlay (mutable dev tags)."
              echo "INFO: local overlay renders successfully ($(echo "$imgs" | wc -l | tr -d ' ') images)."
              echo "::endgroup::"
              continue
            fi
            unpinned=0
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              if [[ "$line" == *"@sha256:"* ]]; then
                echo "INFO: pinned: $line"
              else
                echo "ERROR: NOT digest-pinned: $line"
                unpinned=1
              fi
            done <<< "$imgs"
            if [ "$unpinned" -ne 0 ]; then
              echo "ERROR: $env overlay contains a floating tag -- the #684 root cause. Pin it by @sha256: digest."
              exit 1
            fi
            echo "INFO: OK -- every image in $env overlay is digest-pinned."
            echo "::endgroup::"
          done
          if [ "$found" -eq 0 ]; then
            echo "ERROR: no overlays found under deploy/k8s/overlays/"; exit 1
          fi

name: govulncheck

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Mondays 06:00 UTC

permissions:
  contents: read

# memql-bff-__PRODUCT__'s go.mod has `replace github.com/znasllc-io/memql => ../memql`,
# so vulnerability analysis needs the sibling memql checkout to resolve.

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout memql-bff-__PRODUCT__
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: memql-bff-__PRODUCT__
      - name: Checkout memql (sibling for replace directive)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: znasllc-io/memql
          path: memql
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true
          cache-dependency-path: memql-bff-__PRODUCT__/go.sum
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan
        working-directory: memql-bff-__PRODUCT__
        run: govulncheck ./...

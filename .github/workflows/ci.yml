name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Merge queue: required checks must report on the queue's merge candidate.
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  # The client lane may install org-scoped GitHub Packages (the memQL SDK)
  # once a product wires it; read access costs nothing for the self-contained
  # starter and unblocks every stamped instance.
  packages: read

# PRODUCT CI: the lanes that ship to every stamped instance and also pass
# in-template against the starter payload. Path-filtered (client/deploy/dsl),
# fail-open to running when the diff base is unknown (push / merge_group / first
# push) so a lane is never falsely skipped.
#
# BRANCH-PROTECTION SAFETY: the single required check from this workflow is the
# `ci-required` aggregator at the bottom (plus `scan` from gitleaks.yml).
# Individual jobs must NOT be required checks.
jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      deploy: ${{ steps.filter.outputs.deploy }}
      dsl: ${{ steps.filter.outputs.dsl }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: filter
        name: detect changed areas (fail open to running)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          base=""
          case "$EVENT_NAME" in
            pull_request) base="$BASE_SHA" ;;
            push)         base="$BEFORE_SHA" ;;
          esac
          run_all() { echo "client=true" >> "$GITHUB_OUTPUT"; echo "deploy=true" >> "$GITHUB_OUTPUT"; echo "dsl=true" >> "$GITHUB_OUTPUT"; }
          if [ -z "$base" ] || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            echo "diff base unknown ($EVENT_NAME) -> running all lanes"
            run_all; exit 0
          fi
          changed="$(git diff --name-only "$base" HEAD || true)"
          echo "changed files:"; echo "$changed"
          emit() { if echo "$changed" | grep -qE "$2"; then echo "$1=true" >> "$GITHUB_OUTPUT"; else echo "$1=false" >> "$GITHUB_OUTPUT"; fi; }
          # A change to CI or the stamper re-runs everything (they affect all lanes).
          if echo "$changed" | grep -qE '^\.github/|^scripts/|^product\.env'; then run_all; exit 0; fi
          emit client '^client/'
          emit deploy '^deploy/'
          emit dsl    '^dsl/'

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: shellcheck scripts
        run: |
          shellcheck --version
          find scripts client/scripts -name '*.sh' -print0 | xargs -0 shellcheck --severity=warning

  capability-conformance:
    name: capability-conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: bash syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: print-spec emits valid JSON
        run: scripts/init.sh --print-spec | jq -e '.capability == "product.init" and (.params | length) >= 8'
      - name: help exits 0
        run: scripts/init.sh --help > /dev/null
      - name: no interactive prompts in scripts
        run: |
          if grep -rnE 'read -p|^[[:space:]]*select ' scripts/ | grep -vE '^[^:]+:[0-9]+:[[:space:]]*#'; then
            echo "ERROR: interactive prompt found; capability scripts are non-interactive" >&2
            exit 1
          fi
      - name: missing required param exits 2 with failure envelope
        run: |
          set +e
          out="$(scripts/init.sh --product-org=demo-org 2>/dev/null)"
          code=$?
          set -e
          [ "$code" -eq 2 ] || { echo "expected exit 2, got $code" >&2; exit 1; }
          echo "$out" | jq -e '.ok == false and .error.code == 2' > /dev/null
      - name: unknown flag exits 2
        run: |
          set +e
          scripts/init.sh --product=demo --product-org=demo-org --bogus-flag > /dev/null 2>&1
          code=$?
          set -e
          [ "$code" -eq 2 ] || { echo "expected exit 2 for unknown flag, got $code" >&2; exit 1; }
      - name: dry-run emits success envelope without changing anything
        run: |
          # Use THIS repo's stamped identity when product.env exists; fall back to
          # a demo identity in-template (unstamped). A hardcoded demo identity is
          # REFUSED (exit 3) on any stamped instance -- init.sh's identity guard
          # rejects a mismatched re-stamp before the dry-run branch -- so a
          # demo-only form would make this required lane red on every stamped
          # product (found by instance zero, memql-project#15).
          p=demo; o=demo-org
          if [ -f product.env ]; then
            # shellcheck disable=SC1091
            . ./product.env
            p="$PRODUCT"; o="$PRODUCT_ORG"
          fi
          before="$(git status --porcelain)"
          scripts/init.sh --product="$p" --product-org="$o" --skip-clones --dry-run \
            | jq -e '.ok == true and .result.dryRun == true and .changed == false' > /dev/null
          after="$(git status --porcelain)"
          [ "$before" = "$after" ] || { echo "dry-run mutated the tree" >&2; exit 1; }

  client:
    name: client
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'
      # The starter shell is SELF-CONTAINED (a thin local memQL client + a local
      # generated concepts module) and installs with zero private SDKs. A
      # stamped product that adopts the org SDK (client/.npmrc maps the org
      # scope to GitHub Packages) needs a token at install time, so the lane
      # provides NODE_AUTH_TOKEN unconditionally: the job's GITHUB_TOKEN
      # (packages: read) covers packages linked to the product repo; when the
      # SDK package lives in ANOTHER repo (the common case -- it is published
      # from the engine repo), grant this repo access on the package, or set
      # the optional NPM_PACKAGES_READ_TOKEN repo secret (a PAT with
      # read:packages) which takes precedence. The starter never consults the
      # token (no org-scoped deps), so the lane stays green in-template.
      # The test step runs ONLY when the client defines a `test` script: a
      # product that drops in a vitest/jest suite rides it on this lane
      # automatically, while the starter (which ships no test script) skips it
      # gracefully so the lane stays green in-template.
      - name: npm install + typecheck + build + lint (+ test when defined)
        working-directory: client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build
          npm run lint
          if [ "$(jq -r '.scripts.test // empty' package.json)" ]; then
            npm test
          else
            echo "no client test script defined -- skipping npm test"
          fi

  deploy:
    name: deploy
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: kustomize renders every overlay
        run: |
          for o in local staging prod; do
            echo "==> render deploy/k8s/overlays/$o"
            kubectl kustomize "deploy/k8s/overlays/$o" > "/tmp/render-$o.yaml"
          done
      - name: digest gate (staging/prod product images pinned by @sha256; local exempt)
        run: |
          set -euo pipefail
          for o in staging prod; do
            # Both product images (the DSL bundle + the client SPA) MUST render
            # AND every product-image line MUST be digest-pinned. The positive
            # count assertion (C4) stops the gate passing vacuously if an image
            # name drifts so the grep matches nothing.
            imgs="$(grep -E '^\s*(-?\s*)?image:.*(-dsl-bundle|-client)' "/tmp/render-$o.yaml" || true)"
            n="$(printf '%s\n' "$imgs" | grep -c . || true)"
            if [ "$n" -lt 2 ]; then
              echo "ERROR: $o overlay rendered $n product image(s); expected >=2 (the DSL bundle + the client). Image names may have drifted:" >&2
              printf '%s\n' "$imgs" >&2
              exit 1
            fi
            bad="$(printf '%s\n' "$imgs" | grep -v '@sha256:' || true)"
            if [ -n "$bad" ]; then
              echo "ERROR: $o overlay has a floating (non-digest) product image:" >&2
              printf '%s\n' "$bad" >&2
              exit 1
            fi
            echo "$o: $n product image(s), all digest-pinned"
          done
          # The local overlay is exempt: it uses mutable :local tags for k3d import.
          grep -qE 'dsl-bundle:local' /tmp/render-local.yaml
          echo "digest gate OK"

  dsl:
    name: dsl
    needs: changes
    if: needs.changes.outputs.dsl == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: false
      # No-Go-repo validation via the engine's own load pipeline: `go run
      # ./cmd/memqllint` against a sibling engine clone. Lints the DSL ROOT
      # (dsl/), NOT each namespace dir -- the engine-parity tier (memql#2520,
      # runs the real MemQLEngine.Init boot validators as an overlay) mounts a
      # ROOT OF DOMAINS; handed a single namespace dir it finds no domains and
      # passes trivially. Linting per-domain silently opted every product out of
      # that tier (memql-project#36 / fylo#68), which is how a declared-but-
      # unused arg, a non-canonical @relationship, or a CQS violation reached
      # boot with a green gate. The root form catches them here.
      #
      # Engine ref: the pinned ENGINE_REF from product.env (a stamped instance),
      # else -- the unstamped in-template path -- the SAME default init.sh pins:
      # the latest engine RELEASE tag, resolved via `init.sh --dry-run` so this gate
      # and the stamper can never diverge on the default (memql-project#14). The
      # starter DSL is authored for that ref's grammar, so linting against the ref
      # instances actually get is what keeps this gate honest (the B4 lesson). A
      # failed clone of a known ref is fatal -- no silent fallback to main (C2).
      - name: clone the engine at the pinned/default ref (for memqllint)
        run: |
          set -euo pipefail
          ref=""
          if [ -f product.env ]; then
            # shellcheck disable=SC1091
            . ./product.env
            ref="${ENGINE_REF:-}"
          fi
          if [ -z "$ref" ]; then
            ref="$(scripts/init.sh --product=ci-probe --product-org=ci-probe --skip-clones --dry-run 2>/dev/null | jq -r '.result.engineRef // empty')"
          fi
          [ -n "$ref" ] || { echo "ERROR: could not resolve an engine ref (no product.env pin, and default resolution failed)" >&2; exit 1; }
          echo "engine ref: $ref"
          git clone --depth 1 --branch "$ref" https://github.com/znasllc-io/memql.git /tmp/memql \
            || { echo "ERROR: failed to clone engine at ref '$ref'" >&2; exit 1; }
      - name: memqllint the product DSL root (engine-parity tier)
        run: |
          set -euo pipefail
          dsl_root="$PWD/dsl"
          # Capture the product path before cd'ing into the engine clone.
          [ -d "$dsl_root" ] || { echo "no dsl/ root found" >&2; exit 1; }
          # At least one domain must exist under dsl/, else the parity overlay
          # mounts nothing and passes trivially -- the exact vacuous-gate this
          # lane is meant to prevent.
          if [ -z "$(find "$dsl_root" -mindepth 1 -maxdepth 1 -type d -print -quit)" ]; then
            echo "no dsl/<domain> dir under $dsl_root" >&2
            exit 1
          fi
          echo "linting DSL root: $dsl_root"
          cd /tmp/memql
          go run ./cmd/memqllint "$dsl_root"

  ci-required:
    name: ci-required
    needs: [changes, shellcheck, capability-conformance, client, deploy, dsl]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: all lanes green (skipped path-filtered lanes are OK)
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")' > /dev/null \
            || { echo "a required lane failed or was cancelled" >&2; echo "$results" | jq .; exit 1; }

name: gitleaks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Merge queue (Tier 3, #858): run on the queue's merge candidate too,
  # so a required secret-scan check is reported for the batched tree.
  merge_group:
  schedule:
    - cron: "0 6 * * 1"  # weekly Mondays 06:00 UTC

# Cancel a superseded gitleaks run when a new commit is pushed to the
# same PR; main pushes key off the commit SHA so they never cancel.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

# Installs the gitleaks binary directly from go install rather than using
# `gitleaks/gitleaks-action`, whose v2 release requires a paid license for
# any private repo in an org. The CLI is free everywhere; we use the same
# workflow shape across memql, memql-cockpit, memql-project, and the product carrier repo for
# consistency.
#
# Two scan modes (Tier 0, #855):
#   - Pull requests run a FAST working-tree scan (`gitleaks dir .`) on a
#     shallow checkout -- it inspects the current file contents the PR
#     would merge, with no full-history clone or history walk.
#   - Pushes to main and the weekly schedule run the heavy FULL-HISTORY
#     scan (`gitleaks git .`) on a fetch-depth:0 checkout, the
#     authoritative pass that also catches secrets added-then-removed
#     across commits.

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    steps:
      # PR lane: shallow checkout (default fetch-depth: 1) -- fast.
      - if: github.event_name == 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # main / schedule lane: full history required for `gitleaks git .`.
      - if: github.event_name != 'pull_request'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true
      - name: install gitleaks
        # The GitHub org moved to gitleaks/gitleaks but the Go module path
        # is still the original zricethezav/gitleaks namespace.
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1
      - name: scan working tree (PR, fast incremental)
        if: github.event_name == 'pull_request'
        run: gitleaks dir . --no-banner
      - name: scan full history (main / schedule)
        if: github.event_name != 'pull_request'
        run: gitleaks git . --no-banner

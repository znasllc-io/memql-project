name: template-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

# TEMPLATE-ONLY lanes: they exercise scripts/init.sh end-to-end (stamp a demo
# product and assert it is clean + working). Guarded to the template repo so a
# stamped instance -- which prunes this file anyway -- never runs them. These
# are NOT required checks; the required gate is ci.yml's `ci-required` + the
# gitleaks `scan`.
jobs:
  make-parse-smoke:
    # #34: the template Makefile is parsed by no other lane, so a delimiter
    # regression only surfaced downstream in stamped products. make -n forces
    # a full parse without executing recipes; -include product.env keeps the
    # unstamped root parseable.
    name: make-parse-smoke
    if: github.repository == 'znasllc-io/memql-project'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: template Makefile parses
        run: make -n help > /dev/null

  init-smoke:
    name: init-smoke (${{ matrix.product }})
    if: github.repository == 'znasllc-io/memql-project'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # A plain slug AND a hyphenated one. The hyphenated case gates B5: a
        # hyphen is legal in --product but illegal in a JS/TS identifier, so the
        # generated concepts.ts KEYS must be stamped through the identifier-safe
        # __PRODUCT_ID__ form (hyphens -> underscores) or client typecheck fails.
        product: [demo, demo-app]
    env:
      PRODUCT: ${{ matrix.product }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: '20'

      - name: stamp the product in a temp copy
        run: |
          set -euo pipefail
          stamp_dir="$(mktemp -d)"
          rsync -a --exclude .git ./ "$stamp_dir/"
          cd "$stamp_dir"
          # Regression guard (#15): plant a NON-template file carrying every
          # template token. substitute_tree walks only the template-owned
          # CAP_STAMP_PATHS, so a product repo's own non-template content must
          # survive the stamp byte-for-byte. Asserted below.
          mkdir -p product-content
          printf '__PRODUCT_ID__ __PRODUCT_CAMEL__ __PRODUCT__ __PRODUCT_ORG__ __DOMAIN__ __ENGINE_REF__ __REGISTRY__\n' \
            > product-content/notes.md
          scripts/init.sh --product="$PRODUCT" --product-org=demo-org --domain=demo.local --skip-clones \
            | tee /tmp/init.json
          jq -e --arg p "$PRODUCT" '.ok == true and .changed == true and .result.product == $p' /tmp/init.json > /dev/null
          echo "STAMP_DIR=$stamp_dir" >> "$GITHUB_ENV"

      - name: non-template content is left untouched (scoped stamping) (#15)
        # substitute_tree is scoped to template-owned paths, so the planted decoy
        # (a __TOKEN__-bearing file outside dsl/client/deploy + the stamped docs)
        # must be unchanged. Assert byte-for-byte, then remove it so the remaining
        # steps see the clean stamped tree (e.g. the zero-token grep below).
        run: |
          set -euo pipefail
          cd "$STAMP_DIR"
          expected='__PRODUCT_ID__ __PRODUCT_CAMEL__ __PRODUCT__ __PRODUCT_ORG__ __DOMAIN__ __ENGINE_REF__ __REGISTRY__'
          got="$(cat product-content/notes.md)"
          [ "$got" = "$expected" ] || { echo "ERROR: substitute_tree rewrote non-template content: '$got'" >&2; exit 1; }
          rm -rf product-content

      - name: zero leftover tokens (zero tolerance)
        # Only the ROOT scripts/ is exempt: the stamper (scripts/init.sh)
        # legitimately references the token literals it substitutes. A blanket
        # --exclude-dir=scripts also blinds the check to client/scripts/ (C3), so
        # instead grep the whole tree and drop only matches under ./scripts/.
        # Everything init is meant to stamp (dsl/deploy/client/docs) must be
        # token-free, __PRODUCT_ID__ included.
        run: |
          cd "$STAMP_DIR"
          if grep -rn --exclude-dir=node_modules \
              '__PRODUCT_ID__\|__PRODUCT_CAMEL__\|__PRODUCT__\|__PRODUCT_ORG__\|__DOMAIN__\|__ENGINE_REF__\|__ENGINE_VERSION__\|__REGISTRY__' . \
              | grep -vE '^\./scripts/'; then
            echo "ERROR: unsubstituted template token in the stamped product" >&2
            exit 1
          fi

      - name: zero source-product leakage (copresent|visionarys|fylo)
        # FULL-TREE gate (no exemptions): NO source/sibling product name may appear
        # ANYWHERE in a stamped product -- these clients are stamped for an agency
        # and must never reference one another. Operational files are de-named too
        # (ci.yml + init.sh cite "instance zero, memql-project#15", not the instance
        # repo), so the whole stamped tree -- product surface AND plumbing -- stays
        # clean. Keep it that way: reference issues, never sibling client names.
        run: |
          cd "$STAMP_DIR"
          if grep -rniE 'copresent|visionarys|fylo' .; then
            echo "ERROR: source-product name leaked into the stamped product" >&2
            exit 1
          fi

      - name: structural assertions (renames + product.env + prune)
        run: |
          cd "$STAMP_DIR"
          test -d "dsl/$PRODUCT"
          test ! -e dsl/__PRODUCT__
          test -f "deploy/argocd/apps/$PRODUCT-staging.yaml"
          test -f "deploy/argocd/apps/$PRODUCT-prod.yaml"
          test -f product.env && grep -qx "PRODUCT=$PRODUCT" product.env
          test ! -e product.env.example
          test ! -e .github/workflows/template-ci.yml   # pruned in the stamped copy

      - name: Makefile parse smoke (stamped) (#34)
        # A delimiter/parse regression on the Makefile is invisible without
        # running make: -n forces a full parse (missing-separator class fails
        # on any target) without executing recipes.
        run: |
          cd "$STAMP_DIR"
          make -n help > /dev/null

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: false
      - name: memqllint the stamped DSL root (engine-parity tier) (#36)
        # ci.yml's dsl: lane lints the DSL ROOT so the engine-parity tier
        # (memql#2520) runs. On the UNSTAMPED template that root holds only the
        # __PRODUCT__ placeholder, which is not a valid domain at that tier, so
        # the real parity check lives HERE, on a properly stamped demo -- it
        # catches what per-domain linting missed (declared-but-unused args,
        # non-canonical @relationship types, CQS violations). Mirrors ci.yml:
        # clone the engine at the stamped product.env ref, then lint dsl/ (the
        # root of domains), never a single namespace dir.
        #
        # Runs on the FULL matrix (demo AND demo-app): #38 fixed the identifier
        # stamping this tier caught, so the hyphenated `demo-app` case now passes
        # -- the matrix is exactly what guards that fix from regressing.
        run: |
          set -euo pipefail
          cd "$STAMP_DIR"
          # shellcheck disable=SC1091
          . ./product.env
          ref="${ENGINE_REF:?stamped product.env must pin ENGINE_REF}"
          echo "engine ref: $ref"
          git clone --depth 1 --branch "$ref" https://github.com/znasllc-io/memql.git /tmp/memql-lint \
            || { echo "ERROR: failed to clone engine at ref '$ref'" >&2; exit 1; }
          ( cd /tmp/memql-lint && go run ./cmd/memqllint "$STAMP_DIR/dsl" )

      - name: kustomize renders every overlay (stamped)
        run: |
          for o in local staging prod; do
            echo "==> render deploy/k8s/overlays/$o"
            kubectl kustomize "$STAMP_DIR/deploy/k8s/overlays/$o" > /dev/null
          done

      - name: staging/prod render with identity ENABLED (B2)
        # Authentication must be ON in the public-facing overlays; a rendered
        # MEMQL_IDENTITY_ENABLED="false" would ship the internet-exposed bff with
        # auth disabled. Assert the product bff's value is "true" in both.
        run: |
          set -euo pipefail
          for o in staging prod; do
            kubectl kustomize "$STAMP_DIR/deploy/k8s/overlays/$o" > "/tmp/render-$o.yaml"
            v="$(grep -A1 'name: MEMQL_IDENTITY_ENABLED' "/tmp/render-$o.yaml" | grep -m1 'value:' | sed 's/.*value: *//; s/"//g')"
            [ "$v" = "true" ] || { echo "ERROR: $o renders MEMQL_IDENTITY_ENABLED=$v (want true)" >&2; exit 1; }
          done

      - name: product bff CORS origin is concrete, never wildcard (#16)
        # SERVER_ALLOWED_ORIGINS must never render "*" on the credentialed product
        # bff (it carries user bearer tokens). Base renders the LOCAL front-door
        # origin (https://app.<domain>); staging/prod OVERRIDE it to their public
        # app host via identity-config.yaml. Assert EVERY overlay renders a
        # concrete, non-empty, non-wildcard origin -- the CORS half of #16.
        run: |
          set -euo pipefail
          for o in local staging prod; do
            kubectl kustomize "$STAMP_DIR/deploy/k8s/overlays/$o" > "/tmp/cors-$o.yaml"
            v="$(grep -A1 'name: SERVER_ALLOWED_ORIGINS' "/tmp/cors-$o.yaml" | grep -m1 'value:' | sed 's/.*value: *//; s/"//g')"
            case "$v" in
              ""|"*") echo "ERROR: $o renders SERVER_ALLOWED_ORIGINS='$v' (want a concrete non-wildcard origin)" >&2; exit 1 ;;
            esac
            echo "$o: SERVER_ALLOWED_ORIGINS=$v"
          done

      - name: client npm install + typecheck + build + lint (stamped, self-contained)
        working-directory: ${{ env.STAMP_DIR }}/client
        run: |
          npm install --no-audit --no-fund
          npm run typecheck
          npm run build
          npm run lint

      - name: idempotent re-run reports changed:false
        run: |
          cd "$STAMP_DIR"
          scripts/init.sh --product="$PRODUCT" --product-org=demo-org --domain=demo.local --skip-clones \
            | jq -e '.ok == true and .changed == false' > /dev/null

      - name: re-stamp with a different identity is refused (exit 3, no mutation) (B1)
        run: |
          set -uo pipefail
          cd "$STAMP_DIR"
          before="$(find . -path ./client/node_modules -prune -o -type f -print | sort | xargs cksum 2>/dev/null | cksum)"
          set +e
          out="$(scripts/init.sh --product=other --product-org=demo-org --skip-clones 2>/dev/null)"; code=$?
          set -e
          after="$(find . -path ./client/node_modules -prune -o -type f -print | sort | xargs cksum 2>/dev/null | cksum)"
          [ "$code" -eq 3 ] || { echo "ERROR: identity change exit=$code (want 3)" >&2; exit 1; }
          echo "$out" | jq -e '.ok == false and .error.code == 3' > /dev/null
          [ "$before" = "$after" ] || { echo "ERROR: refused re-run mutated the tree" >&2; exit 1; }

  stamped-dsl:
    name: stamped-dsl
    if: github.repository == 'znasllc-io/memql-project'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: false
      - name: stamp a demo product
        run: |
          set -euo pipefail
          stamp_dir="$(mktemp -d)"
          rsync -a --exclude .git ./ "$stamp_dir/"
          cd "$stamp_dir"
          scripts/init.sh --product=demo --product-org=demo-org --skip-clones > /dev/null
          echo "STAMP_DIR=$stamp_dir" >> "$GITHUB_ENV"
      - name: memqllint the stamped DSL at the STAMPED engine ref (B4)
        # The instance PINS an engine ref in product.env (ENGINE_REF); a stamped
        # tree is only meaningful against THAT ref, never engine main. init.sh now
        # defaults ENGINE_REF to the latest engine RELEASE tag (memql-project#14),
        # so a default stamp pins a release and this gate lints against it. The stamp
        # step ALWAYS writes product.env, so a missing pin is a stamp failure -- fail
        # loudly rather than silently defaulting to main. Mirrors ci.yml's dsl lane;
        # this is the gate that would have caught B3.
        run: |
          set -euo pipefail
          [ -f "$STAMP_DIR/product.env" ] || { echo "ERROR: stamp wrote no product.env" >&2; exit 1; }
          # shellcheck disable=SC1091
          . "$STAMP_DIR/product.env"
          ref="${ENGINE_REF:-}"
          [ -n "$ref" ] || { echo "ERROR: stamped product.env has no ENGINE_REF pin" >&2; exit 1; }
          echo "linting the stamped DSL against engine ref: $ref"
          git clone --depth 1 --branch "$ref" https://github.com/znasllc-io/memql.git /tmp/memql \
            || { echo "ERROR: failed to clone engine at pinned ref '$ref'" >&2; exit 1; }
          cd /tmp/memql && go run ./cmd/memqllint "$STAMP_DIR/dsl/demo"

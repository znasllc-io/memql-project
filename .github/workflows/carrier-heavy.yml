name: carrier-heavy

# The two carrier-payload checks too heavy for the per-PR `ci` workflow: the
# Docker carrier-base build (memql#2446 "Docker shape") and the golden-tree
# equivalence between `memql-cockpit setup project` and bootstrap-direct
# stamping. Dispatch-only + nightly. NOT a required check.
#
# Rationale for keeping these OUT of the per-PR gate: both need a full engine
# sibling checkout (the private znasllc-io/memql), and the golden-tree job
# additionally builds the memql-cockpit binary from a sibling checkout (the
# cockpit's `replace ../memql` makes `go install pkg@main` impossible for the
# private module). That is disproportionate for every PR. The per-PR
# `carrier-payload` job already proves the stamped carrier builds, loads, and
# renders; these confirm the container shape and the cross-front-end invariant.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"  # weekly Monday 07:00 UTC

permissions:
  contents: read

jobs:
  docker-shape:
    name: docker-shape (carrier-base builds)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: stamp workspace
        run: |
          stamp_dir="$(mktemp -d)"
          rsync -a --exclude .git ./ "$stamp_dir/"
          cd "$stamp_dir"
          scripts/bootstrap.sh --product=demo --product-org=demo-org \
            --domain=demo.local --engine-version=main --shallow \
            | jq -e '.ok == true' > /dev/null
          echo "STAMP_DIR=$stamp_dir" >> "$GITHUB_ENV"
      - name: build the carrier-base stage (workspace-parent context)
        run: |
          cd "$STAMP_DIR"
          # Context = the workspace root (parent of memql/ + demo-carrier/); the
          # Dockerfile COPYs both sibling module trees. Build only the expensive
          # tag-independent base stage to validate the container shape.
          docker build --target carrier-base -f demo-carrier/Dockerfile -t demo-carrier-base:ci .

  golden-tree:
    name: golden-tree (cockpit setup == bootstrap-direct)
    runs-on: ubuntu-latest
    steps:
      - name: checkout memql-project
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: memql-project
      - name: checkout memql (engine sibling for the cockpit build + replace)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: znasllc-io/memql
          path: memql
          token: ${{ secrets.MEMQL_SIBLING_TOKEN || github.token }}
      - name: checkout memql-cockpit (sibling for the cockpit build)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: znasllc-io/memql-cockpit
          path: memql-cockpit
          token: ${{ secrets.MEMQL_SIBLING_TOKEN || github.token }}
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
      - name: build the cockpit binary
        working-directory: memql-cockpit
        run: go build -o "$RUNNER_TEMP/memql-cockpit" ./cmd/memql-cockpit
      - name: bootstrap-direct stamp
        run: |
          direct="$(mktemp -d)"
          rsync -a --exclude .git memql-project/ "$direct/proj/"
          cd "$direct/proj"
          scripts/bootstrap.sh --product=demo --product-org=demo-org \
            --domain=demo.local --engine-version=main --shallow \
            --engine-repo="$GITHUB_WORKSPACE/memql" \
            --cockpit-repo="$GITHUB_WORKSPACE/memql-cockpit" > /dev/null
          echo "DIRECT=$direct" >> "$GITHUB_ENV"
      - name: cockpit setup project stamp
        run: |
          ck="$(mktemp -d)"
          "$RUNNER_TEMP/memql-cockpit" setup project \
            --product=demo --product-org=demo-org --domain=demo.local \
            --engine-version=main --shallow \
            --template-repo="$GITHUB_WORKSPACE/memql-project" --dir="$ck/ws"
          echo "COCKPIT=$ck" >> "$GITHUB_ENV"
      - name: diff the stamped carrier trees (must be byte-identical)
        run: |
          diff -r --exclude=.git "$DIRECT/proj/demo-carrier" "$COCKPIT/ws/demo-carrier"
          echo "OK: cockpit setup project == bootstrap-direct (byte-identical carrier)"
